<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface-container-low); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: start; }
  .cardbody { padding: 20px; display: flex; flex-direction: column; gap: 8px; }
  .cardbody .material-symbols-rounded { color: var(--md-sys-color-primary); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Card, Button, Icon } = window.EchoITDesignSystem_36408b;
  const C = ({variant, icon, title, desc}) => (
    <Card variant={variant} interactive>
      <div className="cardbody">
        <Icon name={icon} size={28} fill />
        <span className="md-title-medium">{title}</span>
        <span className="md-body-small" style={{color:"var(--md-sys-color-on-surface-variant)"}}>{desc}</span>
        <div style={{marginTop:8}}><Button variant="text">자세히</Button></div>
      </div>
    </Card>
  );
  function Demo() {
    return (
      <div className="grid">
        <C variant="elevated" icon="cloud" title="클라우드 전환" desc="레거시 인프라를 안전하게 이전" />
        <C variant="filled" icon="smart_toy" title="AI 자동화" desc="업무 프로세스 지능형 자동화" />
        <C variant="outlined" icon="shield" title="보안 관제" desc="24/7 통합 보안 모니터링" />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
