<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface); }
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 18px 12px; color: var(--md-sys-color-on-surface); }
  .cell { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .cell small { font: 400 9px/1.2 var(--md-sys-typescale-font-mono); color: var(--md-sys-color-on-surface-variant); text-align:center; }
  .lbl { font: 500 11px/1 var(--md-sys-typescale-font-plain); letter-spacing:.5px; text-transform:uppercase; color: var(--md-sys-color-on-surface-variant); margin: 0 0 14px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Icon } = window.EchoITDesignSystem_36408b;
  const names = ["auto_awesome","bolt","smart_toy","cloud","shield","hub","support_agent","insights","rocket_launch","memory","search","home","settings","mail","notifications","arrow_forward","check","favorite","dark_mode","apartment"];
  function Demo() {
    return (
      <>
        <p className="lbl">Material Symbols Rounded — opsz/wght/FILL/GRAD variable axes</p>
        <div className="grid">
          {names.map((n,i)=>(
            <div className="cell" key={n}><Icon name={n} fill={i%3===0} weight={i%2?500:400} /><small>{n}</small></div>
          ))}
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
