<!-- @dsCard group="Components" viewport="700x300" name="Form Controls" subtitle="TextField · Switch · Checkbox · Radio" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 32px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
  .lbl { font: 500 11px/1 var(--md-sys-typescale-font-plain); letter-spacing: .5px; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); }
  .ctlrow { display: flex; align-items: center; gap: 16px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { TextField, Switch, Checkbox, Radio } = window.EchoITDesignSystem_36408b;
  function Demo() {
    const [v, setV] = React.useState("name@echoit.kr");
    const [on, setOn] = React.useState(true);
    const [agree, setAgree] = React.useState(true);
    const [plan, setPlan] = React.useState("pro");
    return (
      <div className="grid">
        <div className="stack">
          <span className="lbl">Text field — filled / outlined</span>
          <TextField label="이메일" leadingIcon="mail" value={v} onChange={(e)=>setV(e.target.value)} />
          <TextField variant="outlined" label="회사명" placeholder="EchoIT" trailingIcon="business" />
        </div>
        <div className="stack">
          <span className="lbl">Selection controls</span>
          <div className="ctlrow"><Switch checked={on} onChange={(e)=>setOn(e.target.checked)} /><span className="md-body-medium">다크 모드</span></div>
          <Checkbox checked={agree} onChange={(e)=>setAgree(e.target.checked)} label="개인정보 수집·이용 동의" />
          <div className="ctlrow">
            <Radio name="plan" checked={plan==="basic"} onChange={()=>setPlan("basic")} label="Basic" />
            <Radio name="plan" checked={plan==="pro"} onChange={()=>setPlan("pro")} label="Pro" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
