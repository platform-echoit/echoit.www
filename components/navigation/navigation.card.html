<script type="text/babel">

  const labels = { about: "회사소개", biz: "사업영역", ax: "AX 솔루션", contact: "문의" };
  function Demo() {
    const [tab, setTab] = React.useState("ax");
    return (
      <>
        <Tabs value={tab} onChange={setTab} tabs={[
          {value:"about",label:"회사소개",icon:"apartment"},
          {value:"biz",label:"사업영역",icon:"hub"},
          {value:"ax",label:"AX 솔루션",icon:"auto_awesome"},
          {value:"contact",label:"문의",icon:"mail"},
        ]} />
        <div className="panel md-body-medium">선택됨: {labels[tab]}</div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
