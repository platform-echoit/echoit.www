<!-- @dsCard group="Components" viewport="700x180" name="Chips & Badges" subtitle="Assist / filter / input chips · count badges" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface); }
  .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 16px; }
  .row:last-child { margin-bottom: 0; }
  .lbl { width: 100%; font: 500 11px/1 var(--md-sys-typescale-font-plain); letter-spacing: .5px; text-transform: uppercase; color: var(--md-sys-color-on-surface-variant); margin-bottom: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Chip, Badge, Icon } = window.EchoITDesignSystem_36408b;
  function Demo() {
    const [sel, setSel] = React.useState(["ai"]);
    const toggle = (k) => setSel((s)=> s.includes(k)? s.filter(x=>x!==k): [...s,k]);
    return (
      <>
        <div className="row">
          <span className="lbl">Filter chips</span>
          {[["ai","AI/ML"],["cloud","클라우드"],["sec","보안"],["data","데이터"]].map(([k,l])=>(
            <Chip key={k} type="filter" label={l} selected={sel.includes(k)} onClick={()=>toggle(k)} />
          ))}
        </div>
        <div className="row">
          <span className="lbl">Assist / input chips · badges</span>
          <Chip type="assist" icon="bolt" label="AX 진단" />
          <Chip type="assist" icon="support_agent" label="상담 예약" />
          <Chip type="input" label="user@echoit.kr" onRemove={()=>{}} />
          <Badge count={3} anchored={<Icon name="notifications" />} />
          <Badge dot anchored={<Icon name="mail" />} />
        </div>
      </>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
