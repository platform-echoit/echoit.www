<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESG Hero — Three.js 작업용</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0f1115; }

/* ── HERO CONTAINER ── */
#esg-hero {
  position: relative;
  width: 100%;
  height: calc(60vh - 200px);
  min-height: 260px;
  overflow: hidden;
  cursor: grab;
}
#esg-hero.dragging { cursor: grabbing; }
#esg-hero canvas {
  display: block;
  position: absolute;
  top: 0; left: 0;
  width: 100% !important;
  height: 100% !important;
}

/* ── BACKGROUND SVG (Three.js 교체 전 기본 배경) ── */
#esg-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

/* ── TEXT OVERLAY ── */
#esg-headline {
  position: absolute;
  bottom: 88px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 90%;
  max-width: 800px;
  text-align: center;
  user-select: none;
  pointer-events: none;
  z-index: 10;
  /* 초기엔 보이도록, Three.js 연동 시 opacity:0 → fade-in 처리 */
}
#esg-headline .eyebrow {
  font-family: 'Pretendard', sans-serif;
  font-size: clamp(11px, 1.2vw, 14px);
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #7fd3f3;
}
#esg-headline h1 {
  font-family: 'Pretendard', sans-serif;
  font-weight: 800;
  font-size: clamp(28px, 4.4vw, 54px);
  line-height: 1.12;
  letter-spacing: -1px;
  color: #fff;
}
#esg-headline h1 .g {
  background: linear-gradient(100deg, #89c895, #009ce0);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
#esg-headline .sub {
  font-family: 'Pretendard', sans-serif;
  font-size: clamp(13px, 1.4vw, 17px);
  font-weight: 400;
  line-height: 1.7;
  color: rgba(255,255,255,0.7);
  max-width: 560px;
}

/* ── DRAG HINT ── */
#esg-drag-hint {
  position: absolute;
  bottom: 48px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  font-size: 9px;
  letter-spacing: 0.18em;
  color: rgba(255,255,255,0.3);
  user-select: none;
  pointer-events: none;
  white-space: nowrap;
  z-index: 10;
}
#esg-drag-hint .shaft { width: 34px; height: 1px; background: rgba(255,255,255,0.3); }
#esg-drag-hint .head-l, #esg-drag-hint .head-r { width: 5px; height: 5px; border-color: rgba(255,255,255,0.3); border-style: solid; border-width: 0; }
#esg-drag-hint .head-l { border-left-width: 1px; border-bottom-width: 1px; transform: rotate(45deg); margin-right: -1px; }
#esg-drag-hint .head-r { border-right-width: 1px; border-top-width: 1px; transform: rotate(45deg); margin-left: -1px; }
#esg-drag-hint .label { padding: 0 12px; text-transform: uppercase; }
</style>
</head>
<body>

<!-- ── ESG HERO ── -->
<section id="esg-hero">

  <!-- 기본 SVG 배경 (Three.js 캔버스로 교체될 영역) -->
  <svg id="esg-bg" viewBox="0 0 1440 400" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="g1" cx="20%" cy="50%" r="60%">
        <stop offset="0%" stop-color="#009ce0" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#0f1115" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="g2" cx="80%" cy="50%" r="55%">
        <stop offset="0%" stop-color="#89c895" stop-opacity="0.28"/>
        <stop offset="100%" stop-color="#0f1115" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="1440" height="400" fill="#0f1115"/>
    <rect width="1440" height="400" fill="url(#g1)"/>
    <rect width="1440" height="400" fill="url(#g2)"/>
  </svg>

  <!-- 텍스트 오버레이 (분리됨 — Three.js 작업 시 이 블록만 유지) -->
  <div id="esg-headline">
    <span class="eyebrow">Sustainability · ESG</span>
    <h1>지속가능경영, <span class="g">기술로 잇는 책임</span></h1>
    <p class="sub">현실과 미래를 기술로 잇는 IT기업 에코아이티는 사회적 책임을 바탕으로 지속가능한 성장을 추구합니다. 새로운 가치창출로, 더불어 성장할 수 있는 미래를 만들어가겠습니다.</p>
  </div>

  <!-- Drag hint -->
  <div id="esg-drag-hint">
    <span class="head-l"></span><span class="shaft"></span>
    <span class="label">drag</span>
    <span class="shaft"></span><span class="head-r"></span>
  </div>

</section>

<!-- ======================================================
  Three.js 작업 가이드
  ========================================================
  1. index.html의 Three.js 블록을 참고해서 작업하세요:
     - <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js">
     - <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.4/dist/gsap.min.js">

  2. canvas는 #esg-hero 내부에 자동 생성되도록 설정하거나
     <canvas id="esg-canvas"> 를 직접 추가하세요.

  3. SVG 배경(#esg-bg)은 Three.js 캔버스가 준비되면 display:none 처리하세요.

  4. 텍스트 오버레이(#esg-headline)는 건드리지 않아도 됩니다.
     Three.js 위에 z-index:10으로 떠있습니다.

  5. 완성 후 esg.html의 <section class="eb-hero">...</section>을
     이 파일의 #esg-hero 섹션 전체로 교체하고,
     Three.js 스크립트를 </body> 위에 붙여넣으면 됩니다.
  ====================================================== -->

</body>
</html>
