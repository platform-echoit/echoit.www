<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--md-sys-color-surface); display:flex; gap:14px; }
  .chip { flex:1; height:120px; border-radius:14px; display:flex; flex-direction:column; justify-content:flex-end; padding:12px; box-sizing:border-box; color:#fff; font:600 12px/1.4 var(--md-sys-typescale-font-mono); }
  .grad { flex:1.4; }
</style>
</head>
<body>
  <div class="chip" style="background:#009ce0">Echo Blue<br>#009CE0</div>
  <div class="chip" style="background:#89c895;color:#0d1f13">Echo Green<br>#89C895</div>
  <div class="chip" style="background:#595858">IT Gray<br>#595858</div>
  <div class="chip grad" style="background:var(--echo-gradient)">Signature gradient<br>green → blue</div>
</body>
</html>
