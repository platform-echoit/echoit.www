<!-- @dsCard group="Brand" viewport="700x180" name="EchoIT Logo" subtitle="Color on light · white on brand surface" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; background: var(--md-sys-color-surface); display:flex; }
  .pane { flex:1; height:180px; display:flex; align-items:center; justify-content:center; }
  .light { background: var(--md-sys-color-surface-container-low); }
  .dark { background: linear-gradient(120deg,#003a52,#009ce0); }
  .pane img { width: 184px; height: auto; }
  .cap { position:absolute; bottom:10px; font:500 11px/1 var(--md-sys-typescale-font-mono); }
</style>
</head>
<body>
  <div class="pane light"><img src="../assets/logos/echoit-logo-color.svg" alt="EchoIT" /></div>
  <div class="pane dark"><img src="../assets/logos/echoit-logo-white.svg" alt="EchoIT" /></div>
</body>
</html>
