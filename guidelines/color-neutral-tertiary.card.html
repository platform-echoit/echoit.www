<!-- @dsCard group="Colors" viewport="700x150" name="Neutral & Tertiary" subtitle="Neutral (IT gray) + indigo tertiary tones" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--md-sys-color-surface); display:flex; flex-direction:column; gap:10px; }
  .ramp { display: flex; border-radius: 10px; overflow: hidden; box-shadow: var(--md-sys-elevation-1); }
  .swatch { flex: 1; height: 52px; display: flex; align-items: flex-end; padding: 5px; box-sizing: border-box; }
  .swatch span { font: 600 9px/1.1 var(--md-sys-typescale-font-mono); }
</style>
</head>
<body>
<div class="ramp" id="n"></div>
<div class="ramp" id="t"></div>
<script>
  const cs = getComputedStyle(document.documentElement);
  const tones = [10,20,30,40,50,60,70,80,90,95,99];
  const build = (id, prefix) => {
    const r = document.getElementById(id);
    tones.forEach(t => {
      const hex = cs.getPropertyValue(prefix + t).trim();
      const light = t >= 60;
      r.insertAdjacentHTML('beforeend', `<div class="swatch" style="background:${hex};color:${light?'#1a1c1d':'#fff'}"><span>${t}</span></div>`);
    });
  };
  build('n','--ref-neutral-');
  build('t','--ref-tertiary-');
</script>
</body>
</html>
