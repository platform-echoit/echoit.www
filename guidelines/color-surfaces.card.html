<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & Outline" subtitle="Surface container tones + outline roles" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: var(--md-sys-color-background); }
  .ramp { display:flex; gap:0; border:1px solid var(--md-sys-color-outline-variant); border-radius:12px; overflow:hidden; }
  .cell { flex:1; height:88px; display:flex; align-items:flex-end; padding:8px; box-sizing:border-box; color:var(--md-sys-color-on-surface); font:500 10px/1.3 var(--md-sys-typescale-font-plain); }
</style>
</head>
<body>
<div class="ramp">
  <div class="cell" style="background:var(--surface-dim)">dim</div>
  <div class="cell" style="background:var(--surface-container-lowest)">lowest</div>
  <div class="cell" style="background:var(--surface-container-low)">low</div>
  <div class="cell" style="background:var(--surface-container)">container</div>
  <div class="cell" style="background:var(--surface-container-high)">high</div>
  <div class="cell" style="background:var(--surface-container-highest)">highest</div>
  <div class="cell" style="background:var(--surface-bright)">bright</div>
</div>
</body>
</html>
