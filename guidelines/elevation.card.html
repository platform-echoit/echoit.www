<!-- @dsCard group="Spacing" viewport="700x150" name="Elevation" subtitle="Material 3 shadow levels 0–5" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 24px; background: var(--md-sys-color-surface-container-low); }
  .row { display:flex; gap:24px; align-items:center; justify-content:space-between; }
  .item { display:flex; flex-direction:column; align-items:center; gap:12px; }
  .box { width:80px; height:56px; background: var(--md-sys-color-surface); border-radius:12px; }
  .item small { font:600 10px/1 var(--md-sys-typescale-font-mono); color:var(--md-sys-color-on-surface-variant); }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--md-sys-elevation-0);border:1px solid var(--md-sys-color-outline-variant)"></div><small>0</small></div>
  <div class="item"><div class="box" style="box-shadow:var(--md-sys-elevation-1)"></div><small>1</small></div>
  <div class="item"><div class="box" style="box-shadow:var(--md-sys-elevation-2)"></div><small>2</small></div>
  <div class="item"><div class="box" style="box-shadow:var(--md-sys-elevation-3)"></div><small>3</small></div>
  <div class="item"><div class="box" style="box-shadow:var(--md-sys-elevation-4)"></div><small>4</small></div>
  <div class="item"><div class="box" style="box-shadow:var(--md-sys-elevation-5)"></div><small>5</small></div>
</div>
</body>
</html>
