<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radius" subtitle="Shape scale — xs → full" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface); }
  .row { display:flex; gap:20px; align-items:center; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:72px; height:72px; background: var(--md-sys-color-primary-container); border:1px solid var(--md-sys-color-outline-variant); }
  .item small { font:600 10px/1.3 var(--md-sys-typescale-font-mono); color:var(--md-sys-color-on-surface-variant); text-align:center; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-xs)"></div><small>xs · 4</small></div>
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-sm)"></div><small>sm · 8</small></div>
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-md)"></div><small>md · 12</small></div>
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-lg)"></div><small>lg · 16</small></div>
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-xl)"></div><small>xl · 28</small></div>
  <div class="item"><div class="box" style="border-radius:var(--md-sys-shape-full)"></div><small>full</small></div>
</div>
</body>
</html>
