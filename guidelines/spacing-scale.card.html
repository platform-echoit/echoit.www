<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4dp baseline grid" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface); }
  .row { display:flex; align-items:flex-end; gap:16px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .bar { background: var(--echo-gradient); border-radius: 4px; width: 100%; }
  .item small { font:600 10px/1 var(--md-sys-typescale-font-mono); color:var(--md-sys-color-on-surface-variant); }
</style>
</head>
<body>
<div class="row" id="r"></div>
<script>
  const steps = [[1,4],[2,8],[3,12],[4,16],[6,24],[8,32],[12,48],[16,64]];
  const r = document.getElementById('r');
  steps.forEach(([n,px])=>{
    r.insertAdjacentHTML('beforeend',
      `<div class="item" style="width:${px}px"><div class="bar" style="height:${px}px"></div><small>${px}</small></div>`);
  });
</script>
</body>
</html>
