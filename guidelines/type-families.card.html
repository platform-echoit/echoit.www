<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface); display:flex; gap:40px; }
  .col { display:flex; flex-direction:column; gap:4px; }
  .big { font-family: var(--md-sys-typescale-font-brand); font-size: 40px; }
  .mono { font-family: var(--md-sys-typescale-font-mono); font-size: 28px; }
  .tag { font:400 11px/1.4 var(--md-sys-typescale-font-mono); color:var(--md-sys-color-on-surface-variant); }
  .w { display:flex; gap:14px; align-items:baseline; }
</style>
</head>
<body>
  <div class="col">
    <span class="big">가나다 AaBbGg 123</span>
    <span class="tag">Pretendard Variable — UI · 본문 · 한글/Latin</span>
    <div class="w">
      <span style="font-family:var(--md-sys-typescale-font-brand);font-weight:400;font-size:18px">Regular</span>
      <span style="font-family:var(--md-sys-typescale-font-brand);font-weight:500;font-size:18px">Medium</span>
      <span style="font-family:var(--md-sys-typescale-font-brand);font-weight:700;font-size:18px">Bold</span>
    </div>
  </div>
  <div class="col">
    <span class="mono">echoit_ax()</span>
    <span class="tag">Roboto Mono — 코드 · 데이터</span>
  </div>
</body>
</html>
