<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>echoIT — Particle Hero</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #ffffff; }

    /* ── Hero container ─────────────────────────── */
    #hero {
      position: relative;
      width: 100%;
      height: 60vh;          /* desktop default */
      overflow: hidden;
      cursor: grab;
    }
    #hero.dragging { cursor: grabbing; }

    /* Three.js canvas fills the hero exactly */
    #hero canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Headline block (logo + slogan) ────────── */
    #headline {
      position: absolute;
      top: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 90%;
      text-align: center;
      user-select: none;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
      z-index: 10;
    }
    #headline.show { opacity: 1; }

    #headline .logo img,
    #headline .logo svg {
      display: block;
      height: 20px;
      width: auto;
    }

    #headline .slogan {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: clamp(11px, 1.2vw, 16px);
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1.6;
      color: #3a3a3a;
      white-space: nowrap;
    }
    #headline .slogan strong { font-weight: 600; }

    /* ── Drag hint ──────────────────────────────── */
    #drag-hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 9px;
      font-weight: 400;
      letter-spacing: 0.18em;
      color: #c0c0c0;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 1.5s ease;
      z-index: 10;
    }
    #drag-hint.show { opacity: 1; }
    #drag-hint .shaft { width: 34px; height: 1px; background: #c0c0c0; }
    #drag-hint .head-l,
    #drag-hint .head-r {
      width: 5px; height: 5px;
      border-color: #c0c0c0; border-style: solid; border-width: 0;
    }
    #drag-hint .head-l {
      border-left-width: 1px; border-bottom-width: 1px;
      transform: rotate(45deg); margin-right: -1px;
    }
    #drag-hint .head-r {
      border-right-width: 1px; border-top-width: 1px;
      transform: rotate(45deg); margin-left: -1px;
    }
    #drag-hint .label { padding: 0 12px; text-transform: uppercase; }

    /* ── Breakpoint: 1024px ─────────────────────── */
    @media (max-width: 1024px) {
      #hero { height: 52vh; }
      #headline { top: 32px; gap: 8px; }
      #headline .logo svg { height: 14px; }
      #headline .slogan { font-size: clamp(11px, 1.3vw, 15px); }
    }

    /* ── Breakpoint: 768px ──────────────────────── */
    @media (max-width: 768px) {
      #hero { height: 46vh; }
      #headline { top: 22px; gap: 7px; }
      #headline .logo svg { height: 12px; }
      #headline .slogan {
        font-size: clamp(10px, 2.0vw, 13px);
        white-space: normal;
      }
      #drag-hint { bottom: 16px; }
      #drag-hint .shaft { width: 24px; }
    }
  </style>
</head>
<body>

          <path fill="#009ce0" transform="matrix(1.33333 0 0 -1.33333 92.2743 56.5951)" d="m-23.7925,38.365c0,0 -0.02,0.412 -0.421,0.412l-9.176,0c0,0 -5.75,0.724 -5.75,-5.749l0,-4.465c0,0 -0.594,-5.764 5.78,-5.764l8.994,0c0,0 0.561,-0.047 0.561,0.407l0,2.34c0,0 0.011,0.421 -0.409,0.421l-9.176,0c0,0 -2.649,-0.399 -2.649,2.596l0,0.903l11.673,0c0,0 0.444,-0.022 0.444,0.419l0,1.965c0,0 0.029,0.437 -0.444,0.437l-11.673,0l0,0.741c0,0 -0.337,2.573 2.649,2.573l9.176,0c0,0 0.409,0.014 0.409,0.413l0.012,2.351z"/>

        </svg>
      </span>
      <span class="slogan">The Next Generation of Business, Driven by <strong>AX</strong></span>
    </div>
    <div id="drag-hint">
      <span class="head-l"></span><span class="shaft"></span>
      <span class="label" id="drag-label">drag</span>
      <span class="shaft"></span><span class="head-r"></span>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.4/dist/gsap.min.js"></script>

  <script>
  (function () {
    'use strict';

    // ─────────────────────────────────────────────
    //  Config
    // ─────────────────────────────────────────────
    const MAIN_N     = 2400;
    const DUST_N     = 320;
    const HOLD_SEC   = 3.0;
    const MORPH_SEC  = 2.2;
    const AUTO_ROT   = 0.0010;
    const AUTO_LIMIT = Math.PI / 3;   // ±60°
    const DAMPING    = 0.926;

    // ─────────────────────────────────────────────
    //  Hero element — renderer lives inside here
    // ─────────────────────────────────────────────
    const hero = document.getElementById('hero');

    function heroSize() {
      return { w: hero.clientWidth, h: hero.clientHeight };
    }

    // Camera z-distance: pull back on narrow screens so
    // the particle text stays fully visible horizontally.
    function cameraZ() {
      const w = hero.clientWidth;
      if (w <= 768)  return 8.2;
      if (w <= 1024) return 7.2;
      return 6.2;
    }

    // ─────────────────────────────────────────────
    //  Scene
    // ─────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    const { w: initW, h: initH } = heroSize();
    const camera = new THREE.PerspectiveCamera(52, initW / initH, 0.1, 100);
    camera.position.z = cameraZ();

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(initW, initH);
    hero.appendChild(renderer.domElement);   // ← inside #hero, not body

    // ─────────────────────────────────────────────
    //  Text → particle positions
    // ─────────────────────────────────────────────
    function textToParticles(text, count, { cw=860, ch=380, fs=295, sc=96, zSpread=0.18 } = {}) {
      const c = document.createElement('canvas');
      c.width = cw; c.height = ch;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#000';
      ctx.font = `900 ${fs}px -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, cw/2, ch/2);

      const { data } = ctx.getImageData(0, 0, cw, ch);
      const xs = [], ys = [];
      for (let y = 0; y < ch; y += 3)
        for (let x = 0; x < cw; x += 3)
          if (data[(y*cw+x)*4+3] > 110) { xs.push(x); ys.push(y); }

      for (let i = xs.length-1; i > 0; i--) {
        const j = Math.random()*(i+1)|0;
        let t = xs[i]; xs[i]=xs[j]; xs[j]=t;
            t = ys[i]; ys[i]=ys[j]; ys[j]=t;
      }
      const out = new Float32Array(count*3);
      const hw=cw/2, hh=ch/2, n=xs.length;
      for (let i=0; i<count; i++) {
        const k=i%n;
        out[i*3]   =  (xs[k]-hw)/sc + (Math.random()-.5)*.03;
        out[i*3+1] = -(ys[k]-hh)/sc + (Math.random()-.5)*.03;
        out[i*3+2] =  (Math.random()-.5)*zSpread;
      }
      return out;
    }

    // ─────────────────────────────────────────────
    //  Keyword sprite (system sans-serif)
    // ─────────────────────────────────────────────
    function makeKeywordSprite(text) {
      const dpr = Math.min(devicePixelRatio, 2);
      const fs = 32, pad = 24;
      const fontStr = `300 ${fs}px -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif`;

      const measure = document.createElement('canvas').getContext('2d');
      measure.font = fontStr;
      const m  = measure.measureText(text);
      const tw = Math.ceil(
        (m.actualBoundingBoxLeft !== undefined
          ? m.actualBoundingBoxLeft + m.actualBoundingBoxRight
          : m.width) + 2
      );
      const logW = tw + pad*2, logH = fs + pad;

      const c = document.createElement('canvas');
      c.width = logW*dpr; c.height = logH*dpr;
      const ctx = c.getContext('2d');
      ctx.scale(dpr, dpr);
      ctx.font = fontStr;
      ctx.fillStyle = '#a0a0a0';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(text, logW/2, logH/2);

      const tex = new THREE.CanvasTexture(c);
      const mat = new THREE.SpriteMaterial({ map:tex, transparent:true, depthWrite:false, opacity:0.75 });
      const sp  = new THREE.Sprite(mat);
      const wH  = 0.26;
      sp.scale.set(wH*(logW/logH), wH, 1);
      return sp;
    }

    // ─────────────────────────────────────────────
    //  Group
    // ─────────────────────────────────────────────
    const group = new THREE.Group();
    scene.add(group);

    const dustArr = new Float32Array(DUST_N*3);
    for (let i=0; i<DUST_N; i++) {
      const angle = Math.random()*Math.PI*2;
      const r     = 1.8 + Math.random()*3.2;
      dustArr[i*3]   = Math.cos(angle)*r*(0.7+Math.random()*.6);
      dustArr[i*3+1] = Math.sin(angle)*r*(0.4+Math.random()*.5);
      dustArr[i*3+2] = (Math.random()-.5)*3.0;
    }
    const dustGeo = new THREE.BufferGeometry();
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustArr, 3));
    group.add(new THREE.Points(dustGeo, new THREE.PointsMaterial({ color:0xb0b0b0, size:0.022, sizeAttenuation:true })));

    const mainArr = new Float32Array(MAIN_N*3);
    for (let i=0; i<MAIN_N*3; i++)
      mainArr[i] = (Math.random()-.5)*(i%3===2 ? 3 : 10);
    const mainGeo = new THREE.BufferGeometry();
    mainGeo.setAttribute('position', new THREE.BufferAttribute(mainArr.slice(), 3));
    group.add(new THREE.Points(mainGeo, new THREE.PointsMaterial({ color:0x111111, size:0.046, sizeAttenuation:true })));

    // ─────────────────────────────────────────────
    //  Morph engine
    // ─────────────────────────────────────────────
    const cur  = new Float32Array(mainArr);
    const from = new Float32Array(MAIN_N*3);
    const prog = { t:0 };
    let activeTw = null;

    function morphTo(target, duration, onDone) {
      from.set(cur); prog.t=0;
      if (activeTw) activeTw.kill();
      activeTw = gsap.to(prog, {
        t:1, duration, ease:'power3.inOut',
        onUpdate() {
          const t=prog.t, pos=mainGeo.attributes.position;
          for (let i=0; i<MAIN_N*3; i++) {
            const v=from[i]+(target[i]-from[i])*t;
            pos.array[i]=v; cur[i]=v;
          }
          pos.needsUpdate=true;
        },
        onComplete: onDone
      });
    }

    // ─────────────────────────────────────────────
    //  Drag + inertia
    // ─────────────────────────────────────────────
    let dragging=false, px=0, py=0, vx=0, vy=0, ix=0, iy=0;
    let autoOn=true, autoDir=1, autoTimer=null;

    function pDown(cx,cy) {
      dragging=true; autoOn=false;
      px=cx; py=cy; vx=vy=ix=iy=0;
      if (autoTimer) { autoTimer.kill(); autoTimer=null; }
      hero.classList.add('dragging');
    }
    function pMove(cx,cy) {
      if (!dragging) return;
      const dx=cx-px, dy=cy-py;
      vx=Math.max(-.22,Math.min(.22,dx*.0048));
      vy=Math.max(-.22,Math.min(.22,dy*.0048));
      group.rotation.y += vx;
      group.rotation.x  = Math.max(-1.05,Math.min(1.05, group.rotation.x+vy));
      px=cx; py=cy;
    }
    function pUp() {
      if (!dragging) return;
      dragging=false; ix=vx; iy=vy;
      hero.classList.remove('dragging');
      autoTimer = gsap.delayedCall(5.0, () => { autoOn=true; });
    }

    const cv = renderer.domElement;
    cv.addEventListener('mousedown',  e => pDown(e.clientX, e.clientY));
    cv.addEventListener('mousemove',  e => pMove(e.clientX, e.clientY));
    cv.addEventListener('mouseup',    pUp);
    cv.addEventListener('mouseleave', pUp);
    cv.addEventListener('touchstart', e => { pDown(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive:false });
    cv.addEventListener('touchmove',  e => { pMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive:false });
    cv.addEventListener('touchend',   pUp);

    // ─────────────────────────────────────────────
    //  Render loop
    // ─────────────────────────────────────────────
    (function tick() {
      requestAnimationFrame(tick);
      if (!dragging) {
        if (Math.abs(ix) > 1e-4 || Math.abs(iy) > 1e-4) {
          group.rotation.y += ix;
          group.rotation.x  = Math.max(-1.05,Math.min(1.05, group.rotation.x+iy));
          ix*=DAMPING; iy*=DAMPING;
        } else if (autoOn) {
          group.rotation.y += AUTO_ROT * autoDir;
          if (group.rotation.y >=  AUTO_LIMIT) { group.rotation.y =  AUTO_LIMIT; autoDir=-1; }
          if (group.rotation.y <= -AUTO_LIMIT) { group.rotation.y = -AUTO_LIMIT; autoDir= 1; }
        }
      }
      renderer.render(scene, camera);
    })();

    // ─────────────────────────────────────────────
    //  Resize — update to hero dimensions
    // ─────────────────────────────────────────────
    window.addEventListener('resize', () => {
      const { w, h } = heroSize();
      camera.aspect = w / h;
      camera.position.z = cameraZ();
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    });

    // ─────────────────────────────────────────────
    //  Content
    // ─────────────────────────────────────────────
    const CONTENT = {
      morphWords: ['IT', 'DX', 'AX'],
      keywords: [
        { text: 'SAP',        x: -5.2, y:  0.80, z: -0.8 },
        { text: 'ERP',        x:  5.0, y:  0.40, z: -0.9 },
        { text: 'ITO',        x: -4.6, y: -0.60, z: -1.0 },
        { text: 'Automation', x:  3.8, y: -0.50, z: -1.1 },
        { text: 'SI',         x:  4.4, y:  1.30, z: -0.6 },
        { text: 'TDE',        x: -3.8, y:  1.20, z: -0.7 },
      ],
      dragHintLabel: 'drag'
    };

    // ─────────────────────────────────────────────
    //  Bootstrap
    // ─────────────────────────────────────────────
    const hint      = document.getElementById('drag-hint');
    const dragLabel = document.getElementById('drag-label');

    dragLabel.textContent = CONTENT.dragHintLabel;
    gsap.delayedCall(0.8, () => document.getElementById('headline').classList.add('show'));
    gsap.delayedCall(2.2, () => hint.classList.add('show'));
    cv.addEventListener('mousedown', () =>
      gsap.to(hint, { opacity:0, duration:0.6, ease:'power2.in' })
    , { once:true });

    CONTENT.keywords.forEach(kw => {
      const s = makeKeywordSprite(kw.text);
      s.position.set(kw.x, kw.y, kw.z);
      group.add(s);
    });

    const shapes = CONTENT.morphWords.map(w => textToParticles(w, MAIN_N));
    let si = 0;
    function runNext() {
      morphTo(shapes[si], MORPH_SEC, () =>
        gsap.delayedCall(HOLD_SEC, () => { si=(si+1)%shapes.length; runNext(); })
      );
    }
    gsap.delayedCall(0.5, runNext);

  })();
  </script>
</body>
</html>
